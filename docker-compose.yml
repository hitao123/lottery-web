services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lottery-api
    restart: unless-stopped
    environment:
      PORT: "8080"
      GIN_MODE: release
    expose:
      - "8080"
    networks:
      - lottery

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lottery-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"
    networks:
      - lottery

networks:
  lottery:
    driver: bridge
